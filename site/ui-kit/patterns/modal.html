<!-- Compact (440) — Выбор компании -->
<div class="mdl mdl--compact">
  <div class="mdl-head">
    <div style="flex:1">
      <h3>Выбор компании</h3>
      <div class="sub">Переключение между организациями</div>
    </div>
    <button class="btn btn-sm btn-ghost" style="width:28px; padding:0">✕</button>
  </div>
  <div class="mdl-body picker" style="padding:0">
    <div class="picker-search" style="padding-top:0">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input placeholder="Найти компанию…">
    </div>
    <div class="picker-list" style="max-height:240px">
      <button class="picker-item is-selected">
        <span class="avatar avatar--md avatar--square avatar--tint-1">РБ</span>
        <div class="pi-body">
          <div class="pi-name">ООО «Ромашка-Бэст»</div>
          <div class="pi-meta"><span class="role-chip">Главбух</span> · ИНН <b>7723812931</b></div>
        </div>
        <div class="pi-right"><div class="check"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div></div>
      </button>
      <button class="picker-item">
        <span class="avatar avatar--md avatar--square avatar--tint-3">ПЛ</span>
        <div class="pi-body">
          <div class="pi-name">ИП Петров Л. А.</div>
          <div class="pi-meta"><span class="role-chip">Финдир</span> · ИНН <b>772345678901</b></div>
        </div>
        <div class="pi-right"><div class="check"></div></div>
      </button>
    </div>
  </div>
  <div class="mdl-foot" style="display:flex;">
    <button class="btn btn-md btn-ghost" style="color:var(--color-primary); margin-right:auto">+ Добавить компанию</button>
    <button class="btn btn-md btn-secondary">Отмена</button>
    <button class="btn btn-md btn-primary">Выбрать</button>
  </div>
</div>

<!-- Standard (520) — Выбор категории -->
<div class="mdl">
  <div class="mdl-head">
    <div style="flex:1">
      <h3>Выбор категории ДДС</h3>
      <div class="sub">Можно выбрать только конечную статью</div>
    </div>
    <button class="btn btn-sm btn-ghost" style="width:28px; padding:0">✕</button>
  </div>
  <div class="mdl-body picker" style="padding:0">
    <div class="picker-search" style="padding-top:0">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input placeholder="Найти статью…">
    </div>
    <div class="picker-list" style="max-height:260px">
      <button class="tree-node is-disabled">
        <span class="chev"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="6 9 12 15 18 9"/></svg></span>
        <span class="tn-name">Доходы</span>
        <span class="tn-amount" style="color:var(--success-text);">+5&thinsp;670&thinsp;000 ₽</span>
      </button>
      <div style="padding-left:16px;">
        <button class="tree-node is-selected">
          <span class="chev-spacer"></span>
          <span class="tn-dot" style="background:var(--cat-revenue);"></span>
          <span class="tn-name">Оплата за услуги</span>
          <span class="tn-check"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
        </button>
      </div>
    </div>
    <div class="picker-breadcrumb">
      <span>Выбрано:</span>
      <b>Доходы</b><span class="sep">›</span>
      <b style="color:var(--color-primary-hover);">Оплата за услуги</b>
    </div>
  </div>
  <div class="mdl-foot">
    <button class="btn btn-md btn-secondary">Отмена</button>
    <button class="btn btn-md btn-primary">Выбрать</button>
  </div>
</div>
