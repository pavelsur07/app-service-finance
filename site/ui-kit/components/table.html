<table class="t-table">

      <th style="width:36px">#</th>

      <th class="t-cell--right" style="width:160px">Сумма</th>

  </thead>
  <tbody>
    <tr class="t-row--day"><td colspan="4">Сегодня · 24 июня</td></tr>
    <tr>

      <td>ООО «Технопарк»<div style="color:var(--text-muted); font-size:11px">Оплата по счёту № 245</div></td>

    <tr class="t-row--hover">
      <td>2</td>

    <tr class="t-row--selected">
      <td>3</td>
      <td>ФНС России<div style="color:var(--text-muted); font-size:11px">НДС за 2 кв. 2026</div></td>
      <td class="t-cell--right"><span class="money money--14 money--out">−156&thinsp;200 ₽</span></td>
      <td><span class="status status--warning"><span class="dot"></span>На согласовании</span></td>
    </tr>
    <tr class="t-row--subtotal">
      <td></td>
      <td>Итого за день</td>
      <td class="t-cell--right"><span class="money money--14 money--strong">+50&thinsp;300 ₽</span></td>
      <td></td>
    </tr>
  </tbody>
</table>
