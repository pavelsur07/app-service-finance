<!-- @react KpiCard -->
<!-- @uiKit v1.4 -->
<!-- @docs ui-kit/components/kpi.css -->

<!-- Compact (22px) -->
<div class="demo">
  <div class="kpi" style="flex:1; min-width:200px">
    <div class="kpi-label">Активных счетов</div>
    <div class="kpi-value">10 <span style="font-size:13px; color:var(--text-disabled); font-weight:500">/ 11</span></div>
    <div class="kpi-meta">в 5 банках + 2 кассы</div>
  </div>
  <div class="kpi" style="flex:1; min-width:200px">
    <div class="kpi-label">Поступления</div>
    <div class="kpi-value money--strong">+3&thinsp;820&thinsp;450 ₽</div>
    <div class="kpi-meta"><span class="delta delta--up">+12,4%</span> к прошлому месяцу</div>
  </div>
  <div class="kpi" style="flex:1; min-width:200px">
    <div class="kpi-label">Списания</div>
    <div class="kpi-value money--strong">−2&thinsp;968&thinsp;720 ₽</div>
    <div class="kpi-meta"><span class="delta delta--down">+4,1%</span> к прошлому месяцу</div>
  </div>
</div>

<!-- Hero (28px, тёмный) -->
<div class="demo">
  <div class="kpi kpi--dark" style="flex:1">
    <div class="kpi-label">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="13" rx="2"/><circle cx="12" cy="12.5" r="2.5"/></svg>
      Общий баланс
    </div>
    <div class="kpi-value kpi-value--hero">3&thinsp;829&thinsp;930 ₽</div>
    <div class="kpi-meta"><span class="delta delta--up">+12,4% за месяц</span> · в валюте: $8&thinsp;450</div>
  </div>
</div>
