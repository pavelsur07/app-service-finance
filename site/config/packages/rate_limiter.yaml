framework:
    rate_limiter:
        reports_api:
            policy: fixed_window
            limit: 60
            interval: '1 minute'
        registration:
            policy: fixed_window
            limit: 5
            interval: '10 minutes'
        marketplace_preliminary_rebuild:
            policy: fixed_window
            limit: 1
            interval: '1 minute'

        # WB Finance API: POST /api/finance/v1/sales-reports/detailed
        # Official WB limit: 1 request per 1 minute per seller account.
        # Use 70 seconds as safety margin.
        wb_finance:
            policy: fixed_window
            limit: 1
            interval: '70 seconds'
