# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    feature_funds_and_widget: '%env(bool:FEATURE_FUNDS_AND_WIDGET)%'
    app.storage_root: '%kernel.project_dir%/var/storage'
    app.encryption.key_file: '%env(string:APP_ENCRYPTION_KEY_FILE)%'
    app.encryption.current_key_version: '%env(string:APP_ENCRYPTION_CURRENT_KEY_VERSION)%'
    app.object_storage_driver_default: 'local'
    app.object_storage_s3_bucket_default: ''
    app.object_storage_s3_region_default: 'us-east-1'
    app.object_storage_s3_endpoint_default: ''
    app.object_storage_s3_access_key_default: ''
    app.object_storage_s3_secret_key_default: ''
    app.object_storage_s3_path_style_endpoint_default: '0'
    wb_finance.rate_limit_interval_seconds: 70
    wb_finance.retry_delay_ms: 70000
    telegram.webhook_url: '%env(string:TELEGRAM_WEBHOOK_URL)%'
    telegram.webhook_secret: '%env(string:TELEGRAM_WEBHOOK_SECRET)%'
    telegram.api_base_url: '%env(string:TELEGRAM_API_BASE_URL)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            # Говорим Symfony подставлять ваш клиент Redis туда, где запрашивают Predis\Client с именем $redisClient
            Predis\Client $redisClient: '@session.redis'
            # Публичный URL вебхука Telegram (берём из .env, см. TELEGRAM_WEBHOOK_URL)
            string $telegramWebhookUrl: '%telegram.webhook_url%'
            # Секрет вебхука Telegram: проверяем заголовок X-Telegram-Bot-Api-Secret-Token (пусто = проверка выключена)
            string $telegramWebhookSecret: '%telegram.webhook_secret%'
            # Базовый URL Telegram Bot API (в проде — через шлюз tg-gateway)
            string $telegramApiBaseUrl: '%telegram.api_base_url%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

        # add more service definitions when explicit configuration is needed
        # please note that last definitions always *replace* previous ones
        # Клиент Redis для сессий
    session.redis:
        class: Predis\Client
        arguments:
            - '%env(REDIS_DSN)%'

    Symfony\Component\Lock\Store\RedisStore:
        arguments:
            - '@session.redis'

    Symfony\Component\Lock\LockFactory:
        arguments:
            - '@Symfony\Component\Lock\Store\RedisStore'

    # Обработчик сессий Redis
    Symfony\Component\HttpFoundation\Session\Storage\Handler\RedisSessionHandler:
        arguments:
            - '@session.redis'
            - { prefix: 'sess_', ttl: 1209600 } # 14 дней

    App\Shared\Service\RateLimiter\ReportsApiRateLimiter:
        arguments:
            $factory: '@?limiter.reports_api'

    App\Shared\Service\RateLimiter\RegistrationRateLimiter:
        arguments:
            $factory: '@?limiter.registration'


    App\Marketplace\Infrastructure\Redis\WbFinanceRedisCooldownStorage:
        arguments:
            $redisClient: '@session.redis'

    App\Marketplace\Application\Service\WbFinanceCooldownStorageInterface: '@App\Marketplace\Infrastructure\Redis\WbFinanceRedisCooldownStorage'

    App\Marketplace\Application\Service\WbFinanceRateLimiter:
        arguments:
            $factory: '@limiter.wb_finance'
            $cooldownStorage: '@App\Marketplace\Application\Service\WbFinanceCooldownStorageInterface'

    App\Marketplace\MessageHandler\SyncWbFinancialReportDayHandler:
        arguments:
            $financeRetryDelaySeconds: '%wb_finance.rate_limit_interval_seconds%'

    App\Shared\Service\FeatureFlagService:
        arguments:
            $fundsAndWidgetEnabled: '%feature_funds_and_widget%'

    App\Shared\Service\Storage\StorageService:
        arguments:
            $storageRoot: '%app.storage_root%'

    App\Finance\Facts\PLDailyTotalFactsProvider:
        autowire: true
        autoconfigure: true

    App\Finance\Facts\FactsProviderInterface: '@App\Finance\Facts\PLDailyTotalFactsProvider'

    App\Catalog\Domain\ProductSkuUniquenessChecker: '@App\Catalog\Infrastructure\ProductSkuUniquenessCheckerDoctrine'

    App\Marketplace\Repository\MarketplaceAdvertisingCostRepositoryInterface: '@App\Marketplace\Repository\MarketplaceAdvertisingCostRepository'
    App\Marketplace\Application\Service\WbFinancialReportSyncPlannerInterface: '@App\Marketplace\Application\Service\WbFinancialReportSyncPlanner'
    App\Marketplace\Infrastructure\Api\Ozon\OzonSellerCredentialValidatorInterface: '@App\Marketplace\Infrastructure\Api\Ozon\OzonSellerCredentialValidator'
    App\Ingestion\Domain\Contract\SecretCodec: '@App\Ingestion\Infrastructure\Security\PlaintextSecretCodec'
    App\Ingestion\Command\OzonAccrualCategoryMetadataBulkRunnerInterface: '@App\Ingestion\Command\OzonAccrualCategoryMetadataBulkRunner'
    App\Shared\Service\Storage\ObjectStorageInterface:
        factory: ['@App\Shared\Service\Storage\ObjectStorageFactory', 'create']

    App\Shared\Service\Storage\ObjectStorageFactory:
        arguments:
            $driver: '%env(default:app.object_storage_driver_default:APP_OBJECT_STORAGE_DRIVER)%'
            $storages: !service_locator
                local: '@App\Shared\Service\Storage\LocalObjectStorage'
                s3: '@App\Shared\Service\Storage\FlysystemS3ObjectStorage'

    App\Shared\Service\Storage\FlysystemS3ObjectStorage:
        arguments:
            $bucket: '%env(default:app.object_storage_s3_bucket_default:APP_OBJECT_STORAGE_S3_BUCKET)%'
            $region: '%env(default:app.object_storage_s3_region_default:APP_OBJECT_STORAGE_S3_REGION)%'
            $endpoint: '%env(default:app.object_storage_s3_endpoint_default:APP_OBJECT_STORAGE_S3_ENDPOINT)%'
            $accessKey: '%env(default:app.object_storage_s3_access_key_default:APP_OBJECT_STORAGE_S3_ACCESS_KEY)%'
            $secretKey: '%env(default:app.object_storage_s3_secret_key_default:APP_OBJECT_STORAGE_S3_SECRET_KEY)%'
            $pathStyleEndpoint: '%env(default:app.object_storage_s3_path_style_endpoint_default:APP_OBJECT_STORAGE_S3_PATH_STYLE_ENDPOINT)%'

    App\Ingestion\Facade\CredentialFacade:
        public: true
        arguments:
            $activeKeyVersion: 0

    App\Ingestion\Facade\RawStorageFacade:
        public: true

    App\Ingestion\Facade\SyncFacade:
        public: true

    App\Ingestion\Facade\IngestionFacade:
        public: true

    App\Ingestion\Facade\MarketplaceListingFacade:
        public: true

    App\Finance\Facade\PnlFacade:
        public: true

    App\Ingestion\Infrastructure\Api\Ozon\OzonCredentialProviderInterface: '@App\Ingestion\Infrastructure\Api\Ozon\CredentialFacadeOzonCredentialProvider'
    App\Ingestion\Infrastructure\Api\Ozon\OzonAccrualClientInterface: '@App\Ingestion\Infrastructure\Api\Ozon\OzonAccrualClient'
    App\Ingestion\Infrastructure\Api\Ozon\OzonPerformanceReportClientInterface: '@App\Ingestion\Infrastructure\Api\Ozon\OzonPerformanceReportClient'
    App\Ingestion\Infrastructure\Api\Wildberries\WbCredentialProviderInterface: '@App\Ingestion\Infrastructure\Api\Wildberries\CredentialFacadeWbCredentialProvider'
    App\Ingestion\Infrastructure\Api\Wildberries\WbFinanceReportClientInterface: '@App\Ingestion\Infrastructure\Api\Wildberries\WbFinanceReportClient'

    App\Ingestion\Infrastructure\Api\Wildberries\WbFinanceReportClient:
        arguments:
            $rateLimiter: '@App\Marketplace\Application\Service\WbFinanceRateLimiter'

    App\Ingestion\Application\Source\Ozon\OzonSellerReportConnector:
        arguments:
            $chunkSizeDays: 7
            $hotRewindDays: 14
        tags: ['app.ingestion.connector']

    App\Ingestion\Application\Source\Ozon\OzonPerformanceReportConnector:
        tags: ['app.ingestion.connector']

    App\Ingestion\Application\Source\Wildberries\WbFinanceReportConnector:
        arguments:
            $continuationDelaySeconds: '%wb_finance.rate_limit_interval_seconds%'
        tags: ['app.ingestion.connector']

    App\Ingestion\Application\Source\Ozon\OzonAccrualByDayMapper:
        tags: ['app.ingestion.mapper']

    App\Ingestion\Application\Source\Ozon\OzonAccrualShadowMapper:
        tags: ['app.ingestion.mapper']

    App\Ingestion\Application\Source\Wildberries\WbFinanceSalesReportDetailedMapper:
        tags: ['app.ingestion.mapper']

    App\Ingestion\Domain\Service\ConnectorRegistry:
        arguments:
            $connectors: !tagged_iterator app.ingestion.connector

    App\Ingestion\Domain\Service\MapperRegistry:
        arguments:
            $mappers: !tagged_iterator app.ingestion.mapper

    App\Ingestion\Application\Service\ListingResolverRegistry:
        arguments:
            $resolvers: !tagged_iterator app.ingestion.listing_resolver

    App\Ingestion\Command\RunIncrementalCommand:
        arguments:
            $strategies: !tagged_iterator app.ingestion.incremental_strategy

    App\Ingestion\Application\Service\OzonAccrualIncrementalStrategy:
        tags: ['app.ingestion.incremental_strategy']

    App\Ingestion\Application\Service\WbFinanceIncrementalStrategy:
        tags: ['app.ingestion.incremental_strategy']

    App\Ingestion\Application\Source\Ozon\OzonListingResolver:
        tags: ['app.ingestion.listing_resolver']

    App\Ingestion\Application\Source\Wildberries\WbListingResolver:
        tags: ['app.ingestion.listing_resolver']

    App\Marketplace\Application\Service\WbFinancialReportSyncStatusUpdaterInterface: '@App\Marketplace\Application\Service\WbFinancialReportSyncStatusUpdater'
    App\Marketplace\Application\Service\WbGeneratedRowsSafeReplaceServiceInterface: '@App\Marketplace\Application\Service\WbGeneratedRowsSafeReplaceService'
    App\Marketplace\Repository\MarketplaceFinancialReportSyncStatusLookupInterface: '@App\Marketplace\Repository\MarketplaceFinancialReportSyncStatusRepository'
    App\Marketplace\Repository\MarketplaceOrderRepositoryInterface: '@App\Marketplace\Repository\MarketplaceOrderRepository'
    App\MarketplaceAnalytics\Repository\UnitEconomyCostMappingRepositoryInterface: '@App\MarketplaceAnalytics\Repository\UnitEconomyCostMappingRepository'
    App\MarketplaceAnalytics\Repository\ListingDailySnapshotRepositoryInterface: '@App\MarketplaceAnalytics\Repository\ListingDailySnapshotRepository'
    App\MarketplaceAds\Repository\AdChunkProgressRepositoryInterface: '@App\MarketplaceAds\Repository\AdChunkProgressRepository'
    App\MarketplaceAds\Repository\AdRawDocumentRepositoryInterface: '@App\MarketplaceAds\Repository\AdRawDocumentRepository'
    App\MarketplaceAds\Repository\AdLoadJobRepositoryInterface: '@App\MarketplaceAds\Repository\AdLoadJobRepository'
    App\MarketplaceAds\Application\DispatchOzonAdLoadActionInterface: '@App\MarketplaceAds\Application\DispatchOzonAdLoadAction'
    App\MarketplaceAds\Infrastructure\Query\AdDocumentQueryInterface: '@App\MarketplaceAds\Infrastructure\Query\AdDocumentQuery'

    # ---------- Balance value providers ------------ #
    App\Balance\Provider\:
        resource: '../src/Balance/Provider/'

    App\Balance\Provider\CashTotalsProvider:
        tags: ['app.balance.value_provider']

    App\Balance\Provider\FundsTotalsProvider:
        tags: ['app.balance.value_provider']

    App\Balance\Provider\BalanceValueProviderRegistry:
        arguments:
            $providers: !tagged_iterator app.balance.value_provider

    # ---------- Marketplace adapters ------------ #
    App\Marketplace\Service\Integration\WildberriesAdapter:
        tags: ['app.marketplace.adapter']

    App\Marketplace\Service\Integration\OzonAdapter:
        tags: ['app.marketplace.adapter']

    App\Marketplace\Service\Integration\MarketplaceAdapterRegistry:
        arguments:
            $adapters: !tagged_iterator app.marketplace.adapter

    # ---------- Marketplace cost calculators ------------ #
    App\Marketplace\Service\CostCalculator\WbCommissionCalculator:
        tags:
            - { name: 'app.marketplace.cost_calculator', priority: 110 }

    App\Marketplace\Service\CostCalculator\WbAcquiringCalculator:
        tags:
            - { name: 'app.marketplace.cost_calculator', priority: 109 }

    App\Marketplace\Service\CostCalculator\WbLogisticsDeliveryCalculator:
        tags:
            - { name: 'app.marketplace.cost_calculator', priority: 108 }

    App\Marketplace\Service\CostCalculator\WbLogisticsReturnCalculator:
        tags:
            - { name: 'app.marketplace.cost_calculator', priority: 107 }


    App\Marketplace\Service\CostCalculator\WbLogisticsCorrectionCalculator:
        tags:
            - { name: 'app.marketplace.cost_calculator', priority: 106 }

    App\Marketplace\Service\CostCalculator\WbStorageCalculator:
        tags:
            - { name: 'app.marketplace.cost_calculator', priority: 105 }

    App\Marketplace\Service\CostCalculator\WbPvzProcessingCalculator:
        tags:
            - { name: 'app.marketplace.cost_calculator', priority: 104 }

    App\Marketplace\Service\CostCalculator\WbWarehouseLogisticsCalculator:
        tags:
            - { name: 'app.marketplace.cost_calculator', priority: 103 }

    App\Marketplace\Service\CostCalculator\WbPenaltyCalculator:
        tags:
            - { name: 'app.marketplace.cost_calculator', priority: 102 }

    App\Marketplace\Service\CostCalculator\WbProductProcessingCalculator:
        tags:
            - { name: 'app.marketplace.cost_calculator', priority: 101 }

    App\Marketplace\Service\CostCalculator\WbDeductionCalculator:
        tags:
            - { name: 'app.marketplace.cost_calculator', priority: 100 }

    App\Marketplace\Service\CostCalculator\WbLoyaltyDiscountCalculator:
        tags:
            - { name: 'app.marketplace.cost_calculator', priority: 99 }

    App\Marketplace\Application\ProcessWbCostsAction:
        arguments:
            $costCalculators: !tagged_iterator app.marketplace.cost_calculator

    App\Marketplace\Application\Processor\WbCostsRawProcessor:
        arguments:
            $costCalculators: !tagged_iterator app.marketplace.cost_calculator

    App\Marketplace\Inventory\CostPriceResolverInterface:
        class: App\Marketplace\Inventory\Application\InventoryCostPriceResolver

    # -------------------------------------------------------------------------
    # Добавить в site/config/services.yaml
    # -------------------------------------------------------------------------

    # Data Sources для закрытия месяца
    # Тег marketplace.data_source позволяет добавлять новые источники
    # без изменения ядра — достаточно создать новый класс и добавить тег

    App\Marketplace\Application\Source\SalesReturnsDataSource:
        tags: [ 'marketplace.data_source' ]

    App\Marketplace\Application\Source\CostsDataSource:
        tags: [ 'marketplace.data_source' ]

    # CloseMonthStageAction получает все зарегистрированные Source через tagged_iterator
    App\Marketplace\Application\CloseMonthStageAction:
        arguments:
            $dataSources: !tagged_iterator marketplace.data_source

    App\Marketplace\Application\Source\RealizationDataSource:
        tags: ['marketplace.data_source']

    App\Marketplace\Application\Source\RealizationReturnDataSource:
        tags: ['marketplace.data_source']

    # CostPriceResolverInterface → InventoryCostPriceResolver (уже должен быть)
    # App\Marketplace\Inventory\CostPriceResolverInterface:
    #     class: App\Marketplace\Inventory\Application\InventoryCostPriceResolver

    # ---------- Notification  ------------ #
    App\Notification\Channel\:
        resource: '../src/Notification/Channel/'
        tags: ['app.notification.sender']

    App\Notification\Template\TwigTemplateRenderer:
        arguments: ['@twig']

    App\Notification\Contract\TemplateRendererInterface: '@App\Notification\Template\TwigTemplateRenderer'

    App\Notification\Channel\EmailSender:
        tags: ['app.notification.sender']
        arguments:
            $defaultFrom: '%env(string:APP_MAIL_FROM)%'
            $defaultReplyTo: '%env(string:APP_MAIL_REPLY_TO)%'

    App\Notification\Service\NotificationRouter:
        arguments:
            $senders:
                - '@App\Notification\Channel\EmailSender'

    # Telegram
    App\Telegram\Service\BotLinkService:
        arguments:
            $appSecret: '%kernel.secret%'

    # Генератор внутренних артикулов Catalog
    App\Catalog\Domain\InternalArticleGenerator: '@App\Catalog\Infrastructure\InternalArticleGeneratorDoctrine'

    App\Catalog\Infrastructure\InternalArticleGeneratorDoctrine:
        arguments:
            $connection: '@doctrine.dbal.default_connection'

    App\Shared\Security\Service\FileBasedSecretKeyProvider:
        arguments:
            $keyFile: '%app.encryption.key_file%'
            $currentKeyVersion: '%app.encryption.current_key_version%'
            $fallbackKeyFromEnv: '%env(default::APP_ENCRYPTION_FALLBACK_KEY)%'

    App\Shared\Security\Contract\SecretKeyProviderInterface: '@App\Shared\Security\Service\FileBasedSecretKeyProvider'
    App\Shared\Security\Contract\FieldEncryptionServiceInterface: '@App\Shared\Security\Service\SodiumFieldEncryptionService'
    App\Shared\Security\Contract\SecretRotationServiceInterface: '@App\Shared\Security\Service\SecretRotationService'

    # ---------- MarketplaceAds ---------- #
    App\MarketplaceAds\Domain\Service\ListingSalesProviderInterface:
        '@App\MarketplaceAds\Infrastructure\ListingSalesProviderMarketplace'

    # Парсеры raw-данных рекламных отчётов.
    #
    # OzonAdRawDataParser (JSON) остаётся зарегистрирован как обычный сервис,
    # но БЕЗ тега `marketplace_ads.raw_data_parser`: он теперь инжектится
    # только как fallback-зависимость в OzonPerformanceCsvParser и не попадает
    # в итератор ProcessAdRawDocumentAction напрямую. Это сделано в Task-12-test,
    # чтобы новый CSV+JSON-диспатчер OzonPerformanceCsvParser был единственной
    # точкой входа для Ozon-платформы: он сам решает, парсить CSV нативно
    # (новый cron-driven pipeline с маркером `batch_id=`) или делегировать JSON
    # в legacy-парсер.
    App\MarketplaceAds\Infrastructure\Api\Ozon\OzonAdRawDataParser: ~

    App\MarketplaceAds\Infrastructure\Api\Ozon\OzonPerformanceCsvParser:
        arguments:
            $jsonFallbackParser: '@App\MarketplaceAds\Infrastructure\Api\Ozon\OzonAdRawDataParser'
            $logger: '@monolog.logger.marketplace_ads'
        tags: ['marketplace_ads.raw_data_parser']

    App\MarketplaceAds\Infrastructure\Api\Wildberries\WildberriesAdRawDataParser:
        tags: ['marketplace_ads.raw_data_parser']

    # API-клиенты рекламных платформ
    App\MarketplaceAds\Infrastructure\Api\Ozon\OzonAdClient:
        tags: ['marketplace_ads.platform_client']

    App\MarketplaceAds\Infrastructure\Api\Wildberries\WildberriesAdClient:
        tags: ['marketplace_ads.platform_client']

    # Обработка AdRawDocument → AdDocument + AdDocumentLine
    App\MarketplaceAds\Application\ProcessAdRawDocumentAction:
        arguments:
            $parsers: !tagged_iterator marketplace_ads.raw_data_parser

    # CLI-загрузчик рекламных отчётов получает все API-клиенты через tagged_iterator.
    App\MarketplaceAds\Command\LoadAdDataCommand:
        arguments:
            $platformClients: !tagged_iterator marketplace_ads.platform_client

    App\Marketplace\Infrastructure\Provider\DefaultCostMappingYamlProvider:
        arguments:
            $configPath: "%kernel.project_dir%/config/marketplace/default_cost_mapping.yaml"
