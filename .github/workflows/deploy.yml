name: 🚀 Deploy to Production

on:
    push:
        branches: [ master ]
    pull_request:

jobs:
    # 1. ЭТАП СБОРКИ: Запускаем 4 сборки одновременно
    build-and-push:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - service: landing
                      context: ./landing
                      file: ./landing/docker/production/nginx/Dockerfile
                      image: land-nginx
                    - service: site-nginx
                      context: ./site
                      file: ./site/docker/production/nginx/Dockerfile
                      image: site-nginx
                    - service: site-php-fpm
                      context: ./site
                      file: ./site/docker/production/php-fpm/Dockerfile
                      image: site-php-fpm
                    - service: site-php-cli
                      context: ./site
                      file: ./site/docker/production/php-cli/Dockerfile
                      image: site-php-cli
        permissions:
            contents: read
            packages: write
        steps:
            - name: 📦 Checkout repository
              uses: actions/checkout@v4

            - name: 🔐 Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: 🛠 Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: 🛠 Build and Push ${{ matrix.service }}
              uses: docker/build-push-action@v5
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.file }}
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: |
                      ghcr.io/pavelsur07/${{ matrix.image }}:latest
                      ghcr.io/pavelsur07/${{ matrix.image }}:${{ github.sha }}
                  cache-from: type=gha,scope=${{ matrix.service }}
                  cache-to: type=gha,scope=${{ matrix.service }},mode=max

    # 2. ЭТАП ДЕПЛОЯ (rolling update — минимальный даунтайм)
    deploy:
        needs: build-and-push
        if: github.event_name != 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - name: 📦 Checkout repository
              uses: actions/checkout@v4

            - name: 🛠 Install zip
              run: sudo apt-get install -y zip

            - name: 🔐 Setup SSH key
              uses: webfactory/ssh-agent@v0.8.0
              with:
                  ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

            - name: 📦 Create deploy archive (Configs only)
              run: |
                  zip -r app.zip docker-compose.prod.yml docker/

            - name: 📤 Upload archive to server
              run: |
                  scp -o StrictHostKeyChecking=no app.zip ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_DIR }}

            - name: 🚀 Deploy application (rolling update)
              run: |
                  ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
                    set -e
                    cd ${{ secrets.SERVER_DIR }}

                    echo "📦 Распаковка архива"
                    rm -rf ./current
                    mkdir -p ./current
                    unzip -o app.zip -d ./current
                    rm app.zip

                    cd ./current

                    # Экспортируем переменные для docker compose
                    export APP_ENV="${{ secrets.APP_ENV }}"
                    export APP_SECRET="${{ secrets.APP_SECRET }}"
                    export DATABASE_URL="${{ secrets.DATABASE_URL }}"
                    export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
                    export SITE_MAILER_DSN="${{ secrets.SITE_MAILER_DSN }}"
                    export SENTRY_DSN="${{ secrets.SENTRY_DSN }}"
                    export HEALTH_CHECK_TOKEN="${{ secrets.HEALTH_CHECK_TOKEN }}"

                    echo "🚚 Скачивание свежих образов из GHCR"
                    docker compose -f docker-compose.prod.yml pull land site site-php-fpm site-php-cli

                    # ───────────────────────────────────────────────
                    # ROLLING UPDATE: обновляем сервисы в правильном порядке
                    # Порядок: infra → backend → frontend (reverse proxy)
                    # ───────────────────────────────────────────────

                    echo "🐳 [1/5] Обновляем PHP-FPM (бэкенд)"
                    docker compose -f docker-compose.prod.yml up -d --no-deps --wait site-php-fpm
                    echo "✅ site-php-fpm healthy"

                    echo "🐳 [2/5] Обновляем Nginx (фронтенд сайта)"
                    docker compose -f docker-compose.prod.yml up -d --no-deps --wait site
                    echo "✅ site-nginx healthy"

                    echo "🐳 [3/5] Обновляем Landing"
                    docker compose -f docker-compose.prod.yml up -d --no-deps --wait land
                    echo "✅ land healthy"

                    echo "🐳 [4/5] Обновляем воркеры и CLI"
                    docker compose -f docker-compose.prod.yml up -d --no-deps site-php-cli site-messenger-worker-sync site-messenger-worker-pipeline site-messenger-worker-ads scheduler

                    echo "🐳 [5/5] Поднимаем остальные сервисы (если есть новые)"
                    docker compose -f docker-compose.prod.yml up -d --remove-orphans

                    echo "🧹 Очистка старых образов Docker"
                    docker image prune -f
                    echo "✅ Деплой завершён без даунтайма"
                  EOF

    # 3. ЭТАП МИГРАЦИЙ
    migrations:
        needs: deploy
        if: github.event_name != 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - name: 🔐 Setup SSH key
              uses: webfactory/ssh-agent@v0.8.0
              with:
                  ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

            - name: 🧬 Run Doctrine migrations
              run: |
                  ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
                    set -e
                    cd ${{ secrets.SERVER_DIR }}/current

                    echo "⏳ Ожидаем готовности site-php-fpm (до 90с)..."
                    for i in $(seq 1 30); do
                      STATUS=$(docker inspect --format='{{.State.Health.Status}}' site-php-fpm 2>/dev/null || echo "not_found")
                      if [ "$STATUS" = "healthy" ]; then
                        echo "✅ site-php-fpm healthy"
                        break
                      fi
                      echo "  попытка $i/30: status=$STATUS"
                      sleep 3
                    done
                    if [ "$STATUS" != "healthy" ]; then
                      echo "❌ site-php-fpm не стал healthy за 90с"
                      exit 1
                    fi

                    echo "🚧 Выполняем миграции"
                    export APP_ENV="${{ secrets.APP_ENV }}"
                    export APP_SECRET="${{ secrets.APP_SECRET }}"
                    export DATABASE_URL="${{ secrets.DATABASE_URL }}"
                    export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
                    export SITE_MAILER_DSN="${{ secrets.SITE_MAILER_DSN }}"
                    export SENTRY_DSN="${{ secrets.SENTRY_DSN }}"
                    export HEALTH_CHECK_TOKEN="${{ secrets.HEALTH_CHECK_TOKEN }}"

                    docker compose -f docker-compose.prod.yml run --rm site-php-cli bin/console doctrine:migrations:migrate --no-interaction
                    echo "✅ Миграции применены"
                  EOF

    # 4. ТЕСТЫ НА ПУСТОЙ БД
    migrations-empty-db:
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_DB: app
                    POSTGRES_USER: app
                    POSTGRES_PASSWORD: app
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U app -d app"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5
            redis:
                image: redis:7-alpine
                ports:
                    - "6379:6379"
                options: >-
                    --health-cmd="redis-cli ping"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=10

        steps:
            - name: 📦 Checkout repository
              uses: actions/checkout@v4

            - name: 🐘 Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.3
                  tools: composer

            - name: 📦 Install dependencies
              working-directory: site
              run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

            - name: Install psql client
              run: |
                  sudo apt-get update
                  sudo apt-get install -y postgresql-client

            - name: Create test database (app_test)
              env:
                  PGPASSWORD: app
              run: |
                  set -e
                  if psql -h 127.0.0.1 -p 5432 -U app -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='app_test'" | grep -q 1; then
                    echo "Database app_test already exists"
                  else
                    echo "Creating database app_test"
                    psql -h 127.0.0.1 -p 5432 -U app -d postgres -c "CREATE DATABASE app_test"
                  fi

            - name: 🧬 Run Doctrine migrations
              working-directory: site
              env:
                  APP_ENV: test
                  APP_DEBUG: 0
                  DATABASE_URL: "pgsql://app:app@127.0.0.1:5432/app?serverVersion=15&charset=utf8"
                  REDIS_DSN: "redis://127.0.0.1:6379"
                  MESSENGER_TRANSPORT_DSN: "redis://127.0.0.1:6379/messages"
              run: php bin/console doctrine:migrations:migrate --no-interaction

    # 5. ПРОВЕРКА СИНХРОНИЗАЦИИ API-ТИПОВ
    api-types-check:
        name: 🔍 Check API types sync
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_DB: app
                    POSTGRES_USER: app
                    POSTGRES_PASSWORD: app
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U app -d app"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5
            redis:
                image: redis:7-alpine
                ports:
                    - "6379:6379"
                options: >-
                    --health-cmd="redis-cli ping"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=10

        steps:
            - name: 📦 Checkout repository
              uses: actions/checkout@v4

            - name: 🐘 Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.3
                  tools: composer

            - name: 📦 Install PHP dependencies
              working-directory: site
              run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

            - name: 📦 Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'yarn'
                  cache-dependency-path: site/yarn.lock

            - name: 📦 Install Node dependencies
              working-directory: site
              run: yarn install --frozen-lockfile

            - name: 🧬 Generate OpenAPI spec
              working-directory: site
              env:
                  APP_ENV: dev
                  APP_DEBUG: 0
                  DATABASE_URL: "pgsql://app:app@127.0.0.1:5432/app?serverVersion=15&charset=utf8"
                  REDIS_DSN: "redis://127.0.0.1:6379"
                  MESSENGER_TRANSPORT_DSN: "redis://127.0.0.1:6379/messages"
              run: |
                  mkdir -p var
                  php bin/console nelmio:apidoc:dump --format=json > var/openapi.json

            - name: 🔍 Check TypeScript schema is up to date
              working-directory: site
              run: |
                  npx openapi-typescript var/openapi.json -o /tmp/schema.check.d.ts
                  if ! diff -q /tmp/schema.check.d.ts assets/api/schema.d.ts > /dev/null; then
                      echo "::error::site/assets/api/schema.d.ts is out of sync with OpenAPI spec"
                      echo ""
                      echo "The committed TypeScript schema does not match what would be generated from the current backend code."
                      echo ""
                      echo "To fix: run 'make api-types' locally and commit the updated site/assets/api/schema.d.ts"
                      echo ""
                      echo "Diff:"
                      diff /tmp/schema.check.d.ts assets/api/schema.d.ts || true
                      exit 1
                  fi
                  echo "✅ schema.d.ts is in sync with OpenAPI spec"