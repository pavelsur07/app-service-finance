# ───────────────────────────────────────────────────────────────
# Общий блок переменных окружения (DRY) — московское время
# ───────────────────────────────────────────────────────────────
x-tz-env: &tz-env
    TZ: Europe/Moscow

services:
    traefik:
        image: traefik:3.3
        environment:
            <<: *tz-env
        command:
            --providers.docker=true
            --providers.docker.exposedByDefault=false
            --entryPoints.http.address=:80
        ports:
            - "80:80"
            - "8080:8080"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        labels:
            - traefik.enable=true
            - traefik.docker.network=traefik-public
        networks:
            - traefik-public
    land:
        image: nginx:1.27-alpine
        restart: unless-stopped
        environment:
            <<: *tz-env
        volumes:
          - ./landing/public:/usr/share/nginx/html:ro
          - ./landing/nginx/conf.d:/etc/nginx/conf.d:ro
        networks:
          - traefik-public
        labels:
          - traefik.enable=true
          - traefik.docker.network=traefik-public

          # Traefik router → land.localhost
          - traefik.http.routers.land.rule=Host(`land.localhost`)
          - traefik.http.routers.land.entryPoints=http
          - traefik.http.routers.land.service=land
          - traefik.http.services.land.loadbalancer.server.port=80
    site:
        build:
            context: site/docker
            dockerfile: development/nginx/Dockerfile
        environment:
            <<: *tz-env
        volumes:
            - ./site:/app
            - ./landing:/app/landing   # ← добавили
        networks:
            - traefik-public
            - default
        labels:
            - traefik.enable=true
            - traefik.docker.network=traefik-public
            - traefik.http.routers.site.rule=Host(`localhost`)
            - traefik.http.routers.site.entryPoints=http
            - traefik.http.services.site.loadBalancer.server.port=80
    site-php-fpm:
        build:
            context: site/docker
            dockerfile: development/php-fpm/Dockerfile
        container_name: symfony-php-fpm
        environment:
            <<: *tz-env
        depends_on:
            site-postgres:
                condition: service_healthy
            site-redis:
                condition: service_healthy
        volumes:
          - ./site:/app
    site-php-cli:
        build:
            context: site/docker
            dockerfile: development/php-cli/Dockerfile
        container_name: symfony-cli
        working_dir: /app
        environment:
            <<: *tz-env
        volumes:
            - ./site:/app
        command: php bin/console
    site-frontend:
        image: node:20-alpine
        container_name: symfony-frontend
        working_dir: /app
        environment:
            <<: *tz-env
        volumes:
            - ./site:/app
        ports:
            - "5173:5173" # <-- ДОБАВИТЬ ЭТО (проброс порта Vite)
        command: sh -c "yarn install && yarn dev"
    site-php-cli-worker:
        build:
            context: site/docker
            dockerfile: development/php-cli/Dockerfile
        working_dir: /app
        restart: unless-stopped
        environment:
            <<: *tz-env
        depends_on:
            site-postgres:
                condition: service_healthy
            site-redis:
                condition: service_healthy
        volumes:
            - ./site:/app
        command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M -vv
    site-postgres:
        image: postgres:15-alpine
        container_name: symfony-postgres
        restart: always
        environment:
            <<: *tz-env
            POSTGRES_DB: app
            POSTGRES_USER: app
            POSTGRES_PASSWORD: secret
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U app -d app"]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 5s
    site-redis:
        image: redis:7-alpine
        container_name: site-redis
        restart: unless-stopped
        environment:
            <<: *tz-env
        command: [ "redis-server", "--appendonly", "yes" ]
        volumes:
          - site-redis-data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 5s
    site-mailer:
        image: mailhog/mailhog
        environment:
            <<: *tz-env
        networks:
            - traefik-public
            - default
        labels:
            - traefik.enable=true
            - traefik.docker.network=traefik-public
            - traefik.http.routers.mailer.rule=Host(`mailer.localhost`)
            - traefik.http.routers.mailer.entryPoints=http
            - traefik.http.services.mailer.loadBalancer.server.port=8025
volumes:
    postgres_data:
    site-redis-data:
networks:
    traefik-public:
        name: traefik-public
        driver: bridge