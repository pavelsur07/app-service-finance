services:
    tg-traefik:
        image: traefik:3.3
        container_name: tg-traefik
        restart: always
        environment:
            DOCKER_API_VERSION: "1.40"
        command:
            - --providers.docker=true
            - --providers.docker.exposedByDefault=false
            - --entrypoints.http.address=:80
            - --entrypoints.https.address=:443

            - --certificatesresolvers.letsEncrypt.acme.httpChallenge=true
            - --certificatesresolvers.letsEncrypt.acme.httpChallenge.entryPoint=http
            - --certificatesresolvers.letsEncrypt.acme.email=mail@2bstock.ru
            - --certificatesresolvers.letsEncrypt.acme.storage=/certs/acme.json

            - --log.level=INFO

        ports:
            - "80:80"
            - "443:443"

        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - tg-traefik-certs:/certs

        networks:
            - tg-gateway-public

    tg-nginx:
        image: nginx:1.25-alpine
        container_name: tg-gateway-nginx
        restart: always

        volumes:
            - ./nginx/tg.conf:/etc/nginx/conf.d/default.conf:ro

        expose:
            - "80"

        networks:
            - tg-gateway-public

        labels:
            - traefik.enable=true

            # HTTPS router: только Telegram webhook
            - traefik.http.routers.tg-webhook.rule=Host(`tg.vashfindir.ru`) && Path(`/telegram/webhook`)
            - traefik.http.routers.tg-webhook.entrypoints=https
            - traefik.http.routers.tg-webhook.tls=true
            - traefik.http.routers.tg-webhook.tls.certresolver=letsEncrypt
            - traefik.http.services.tg-webhook.loadbalancer.server.port=80

            # HTTP -> HTTPS redirect только для webhook path
            - traefik.http.routers.tg-webhook-http.rule=Host(`tg.vashfindir.ru`) && Path(`/telegram/webhook`)
            - traefik.http.routers.tg-webhook-http.entrypoints=http
            - traefik.http.routers.tg-webhook-http.middlewares=tg-redirect-to-https
            - traefik.http.middlewares.tg-redirect-to-https.redirectscheme.scheme=https
            - traefik.http.middlewares.tg-redirect-to-https.redirectscheme.permanent=true

            - traefik.docker.network=tg-gateway-public

volumes:
    tg-traefik-certs:

networks:
    tg-gateway-public:
        name: tg-gateway-public
        driver: bridge