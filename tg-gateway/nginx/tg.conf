server {
    listen 80;
    charset utf-8;
    server_tokens off;

    resolver 127.0.0.11 ipv6=off valid=30s;

    access_log /var/log/nginx/tg-gateway.access.log;
    error_log /var/log/nginx/tg-gateway.error.log warn;

    client_max_body_size 5m;

    location /health {
        add_header Content-Type text/plain;
        return 200 'alive';
    }

    location = /telegram/webhook {
        set $app_upstream https://app.vashfindir.ru;

        proxy_pass $app_upstream/telegram/webhook;

        proxy_ssl_server_name on;
        proxy_ssl_name app.vashfindir.ru;
        proxy_ssl_verify off;

        proxy_set_header Host app.vashfindir.ru;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering off;

        proxy_intercept_errors on;
        error_page 502 503 504 = @upstream_error;
    }

    # Исходящий прокси app → Telegram Bot API (app-сервер не имеет прямого доступа к api.telegram.org).
    # Доступ ограничен на уровне Traefik (ipAllowList по IP app-сервера), nginx за traefik не видит реальный IP.
    location /bot-api/ {
        set $tg_api https://api.telegram.org;
        # /bot-api/botXXX/method -> https://api.telegram.org/botXXX/method (в т.ч. /file/botXXX/...)
        rewrite ^/bot-api/(.*)$ /$1 break;
        proxy_pass $tg_api;

        proxy_ssl_server_name on;
        proxy_ssl_name api.telegram.org;
        proxy_set_header Host api.telegram.org;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering off;
    }

    location @upstream_error {
        add_header Content-Type application/json always;
        return 502 '{"error":{"code":"upstream_unavailable","message":"Gateway upstream error"}}';
    }

    location / {
        return 404;
    }
}