version: '3.8'
x-logging: &default-logging
    driver: "json-file"
    options:
        max-size: "10m"
        max-file: "3"

# ───────────────────────────────────────────────────────────────
# Общий блок переменных окружения для PHP-сервисов (DRY)
# ───────────────────────────────────────────────────────────────
x-php-env: &php-env
    TZ: Europe/Moscow
    DATABASE_URL: pgsql://app:${POSTGRES_PASSWORD}@site-postgres:5432/app
    APP_ENV: prod
    APP_SECRET: ${APP_SECRET}
    REDIS_DSN: redis://site-redis:6379
    MESSENGER_TRANSPORT_DSN: redis://site-redis:6379/messages
    MAILER_DSN: ${SITE_MAILER_DSN}
    SENTRY_DSN: ${SENTRY_DSN}
    HEALTH_CHECK_TOKEN: ${HEALTH_CHECK_TOKEN}
    APP_MAIL_FROM: "Ваш Финдир <support@vashfindir.ru>"
    APP_MAIL_REPLY_TO: "support@vashfindir.ru"
    FEATURE_FUNDS_AND_WIDGET: ${FEATURE_FUNDS_AND_WIDGET:-1}
    LLM_API_URL: "https://example.com/v1/chat/completions"
    LLM_API_KEY: "change-me"

services:

    traefik:
        image: traefik:3.3
        container_name: traefik
        restart: always
        environment:
            - TZ=Europe/Moscow
        command:
            - --api.dashboard=true
            - --api.insecure=true
            - --providers.docker=true
            - --providers.docker.exposedByDefault=false
            - --entrypoints.http.address=:80
            - --entrypoints.https.address=:443
            - --certificatesresolvers.letsEncrypt.acme.httpChallenge=true
            - --certificatesresolvers.letsEncrypt.acme.httpChallenge.entryPoint=http
            - --certificatesresolvers.letsEncrypt.acme.email=mail@2bstock.ru
            - --certificatesresolvers.letsEncrypt.acme.storage=/certs/acme.json
            - --log.level=INFO
            # ⬇️ FIX: Traefik будет считать контейнер «живым» только после прохождения healthcheck
            - --providers.docker.defaultRule=
        ports:
            - "80:80"
            - "443:443"
            - "127.0.0.1:8080:8080"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - traefik-certs:/certs
        networks:
            - traefik-public
        labels:
            - traefik.enable=true

            # Глобальный роутер HTTP -> HTTPS
            - traefik.http.routers.http-catchall.rule=Host(`app.vashfindir.ru`) || Host(`app.2bstock.ru`) || Host(`www.app.2bstock.ru`)
            - traefik.http.routers.http-catchall.entrypoints=http
            - traefik.http.routers.http-catchall.middlewares=legacy-domain-redirect,redirect-to-https
            - traefik.http.routers.http-catchall.priority=1

            - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
            - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true

            - traefik.http.middlewares.legacy-domain-redirect.redirectregex.regex=^https?://(?:www\.)?app\.2bstock\.ru/(.*)$$
            - traefik.http.middlewares.legacy-domain-redirect.redirectregex.replacement=https://app.vashfindir.ru/$${1}
            - traefik.http.middlewares.legacy-domain-redirect.redirectregex.permanent=true
            - traefik.http.routers.legacy-app.rule=Host(`app.2bstock.ru`) || Host(`www.app.2bstock.ru`)
            - traefik.http.routers.legacy-app.entrypoints=https
            - traefik.http.routers.legacy-app.middlewares=legacy-domain-redirect
            - traefik.http.routers.legacy-app.tls=true
            - traefik.http.routers.legacy-app.tls.certresolver=letsEncrypt

    land:
        image: ghcr.io/pavelsur07/land-nginx:latest
        container_name: land-nginx
        restart: always
        environment:
            - TZ=Europe/Moscow
        expose:
            - "80"
        networks:
            - traefik-public
            - default
        # ⬇️ FIX: healthcheck для landing nginx
        healthcheck:
            test: ["CMD", "curl", "-f", "http://127.0.0.1/"]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 5s
        labels:
            - traefik.enable=true
            - traefik.http.routers.land.rule=Host(`2bstock.ru`) || Host(`www.2bstock.ru`)
            - traefik.http.routers.land.entrypoints=https
            - traefik.http.routers.land.tls=true
            - traefik.http.routers.land.tls.certresolver=letsEncrypt
            - traefik.http.services.land.loadbalancer.server.port=80
            - traefik.http.routers.land-http.rule=Host(`2bstock.ru`) || Host(`www.2bstock.ru`)
            - traefik.http.routers.land-http.entrypoints=http
            - traefik.http.routers.land-http.middlewares=redirect-to-https
            - traefik.http.routers.land-http.priority=10
            - traefik.docker.network=traefik-public

    site:
        image: ghcr.io/pavelsur07/site-nginx:latest
        container_name: site-nginx
        restart: always
        environment:
            - TZ=Europe/Moscow
        depends_on:
            site-php-fpm:
                # ⬇️ FIX: Nginx стартует ТОЛЬКО когда PHP-FPM прошёл healthcheck (отвечает на /ping)
                condition: service_healthy
        expose:
            - "80"
        networks:
            - traefik-public
            - default
        # ⬇️ FIX: healthcheck для site nginx — /health возвращает 200
        healthcheck:
            test: ["CMD", "curl", "-f", "http://127.0.0.1/health"]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 10s
        labels:
            - traefik.enable=true
            - traefik.http.routers.myapp.rule=Host(`app.vashfindir.ru`)
            - traefik.http.routers.myapp.entrypoints=https
            - traefik.http.routers.myapp.tls=true
            - traefik.http.routers.myapp.tls.certresolver=letsEncrypt
            - traefik.http.services.myapp.loadbalancer.server.port=80
            - traefik.http.routers.myapp-http.rule=Host(`app.vashfindir.ru`)
            - traefik.http.routers.myapp-http.entrypoints=http
            - traefik.http.routers.myapp-http.middlewares=redirect-to-https
            - traefik.http.routers.myapp-http.priority=10
            - traefik.docker.network=traefik-public
        volumes:
            - site_storage:/app/var/storage

    site-php-fpm:
        image: ghcr.io/pavelsur07/site-php-fpm:latest
        container_name: site-php-fpm
        restart: always
        logging: *default-logging
        environment:
            <<: *php-env
        networks:
            - default
        depends_on:
            site-postgres:
                # ⬇️ FIX: PHP-FPM ждёт, пока Postgres пройдёт healthcheck
                condition: service_healthy
            site-redis:
                # ⬇️ FIX: PHP-FPM ждёт, пока Redis пройдёт healthcheck
                condition: service_healthy
        volumes:
            - site_storage:/app/var/storage
            - site_var_log:/app/var/log
        # ⬇️ FIX: увеличен start_period — даём время на cache:warmup при первом старте
        healthcheck:
            test: ["CMD-SHELL", "REDIRECT_STATUS=true SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1"]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 30s
        # ⬇️ FIX: Даём контейнеру 30 секунд на graceful shutdown (дождаться завершения текущих запросов)
        stop_grace_period: 30s
        deploy:
            resources:
                limits:
                    memory: 1500M
                reservations:
                    memory: 256M

    site-php-cli:
        image: ghcr.io/pavelsur07/site-php-cli:latest
        container_name: site-php-cli
        environment:
            <<: *php-env
        networks:
            - default
        depends_on:
            site-postgres:
                condition: service_healthy
            site-redis:
                condition: service_healthy
        volumes:
            - site_storage:/app/var/storage
            - site_var_log:/app/var/log

    site-messenger-worker:
        image: ghcr.io/pavelsur07/site-php-cli:latest
        container_name: site-messenger-worker
        restart: always
        command: php bin/console messenger:consume async -vv --time-limit=3600
        environment:
            <<: *php-env
        networks:
            - default
        depends_on:
            site-postgres:
                condition: service_healthy
            site-redis:
                condition: service_healthy
        volumes:
            - site_storage:/app/var/storage
            - site_var_log:/app/var/log
        # ⬇️ FIX: Даём воркеру завершить текущее сообщение при остановке
        stop_grace_period: 60s
        healthcheck:
            test: [ "CMD-SHELL", "ps aux | grep 'messenger:consume' | grep -v grep" ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s

    site-postgres:
        image: postgres:15-alpine
        container_name: symfony-postgres
        restart: always
        logging: *default-logging
        environment:
            TZ: Europe/Moscow
            POSTGRES_DB: app
            POSTGRES_USER: app
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        command: >
            postgres 
            -c shared_buffers=1GB 
            -c effective_cache_size=3GB 
            -c work_mem=16MB 
            -c maintenance_work_mem=256MB
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - default
        # ⬇️ FIX: Добавлен healthcheck (без него depends_on condition: service_healthy не работает)
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U app -d app"]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 10s

    site-redis:
        image: redis:7-alpine
        container_name: site-redis
        restart: always
        environment:
            - TZ=Europe/Moscow
        command: ["redis-server", "--appendonly", "yes"]
        volumes:
            - site-redis-data:/data
        networks:
            - default
        # ⬇️ FIX: Добавлен healthcheck
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 5s

    scheduler:
        image: ghcr.io/pavelsur07/site-php-cli:latest
        container_name: scheduler
        user: root
        entrypoint: ["/usr/local/bin/supercronic"]
        command: ["-json", "/etc/crontabs/app.cron"]
        environment:
            TZ: Europe/Moscow
            DATABASE_URL: pgsql://app:${POSTGRES_PASSWORD}@site-postgres:5432/app
            APP_ENV: prod
            APP_DEBUG: 0
            APP_SECRET: ${APP_SECRET}
            REDIS_DSN: redis://site-redis:6379
            MESSENGER_TRANSPORT_DSN: redis://site-redis:6379/messages
            MAILER_DSN: ${SITE_MAILER_DSN}
            SENTRY_DSN: ${SENTRY_DSN}
            APP_MAIL_FROM: "Ваш Финдир <support@vashfindir.ru>"
            APP_MAIL_REPLY_TO: "support@vashfindir.ru"
            FEATURE_FUNDS_AND_WIDGET: ${FEATURE_FUNDS_AND_WIDGET:-1}
        volumes:
            - ./docker/cron/app.cron:/etc/crontabs/app.cron:ro
            - ./var/log/cron:/var/log/cron:rw
        depends_on:
            site-postgres:
                condition: service_healthy
            site-redis:
                condition: service_healthy
        restart: unless-stopped

volumes:
    site_storage:
    site_var_log:
    traefik-certs:
    postgres_data:
    site-redis-data:

networks:
    traefik-public:
        external: true
    default:
        driver: bridge